<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Candidator</title>
    <script>
      // Redirect SPA — GitHub Pages renvoie une 404 pour les routes inconnues.
      // Ce script redirige vers index.html en conservant le chemin dans le hash.
      // Avec HashRouter, toutes les routes passent par #/ donc ce fichier est
      // surtout là par sécurité.
      sessionStorage.redirect = location.href
    </script>
    <meta http-equiv="refresh" content="0;url=/Candidator/" />
  </head>
  <body></body>
</html>
